name: Build and Release Windows EXE

on:
  push:
    tags:
      - "v*"           # Triggers on tags like v1.0, v1.2.3, etc.
  workflow_dispatch:    # Also allows manual runs from the Actions tab

permissions:
  contents: write       # Needed to create a GitHub Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows EXE with PyInstaller
        run: |
          pyinstaller --onefile --name analyze_materials --console analyze_materials.py

      - name: Smoke-test the binary
        shell: pwsh
        run: |
          dist\analyze_materials.exe --help

      - name: Upload EXE as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: analyze_materials-windows
          path: dist/analyze_materials.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/analyze_materials.exe
          generate_release_notes: true
