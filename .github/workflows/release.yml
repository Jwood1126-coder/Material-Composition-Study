name: Build and Release Windows EXE

on:
  push:
    tags:
      - "v*"           # Triggers on tags like v1.0, v1.2.3, etc.
  workflow_dispatch:    # Also allows manual runs from the Actions tab

permissions:
  contents: write       # Needed to create a GitHub Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name MaterialCompositionAnalyzer analyze_materials.py

      - name: Smoke-test the binary (file exists, sane size)
        shell: pwsh
        run: |
          # Don't actually launch a --windowed binary in CI — Start-Process
          # on a GUI app can hang Wait. Just verify the build produced a
          # plausible-looking binary.
          $exe = "dist\MaterialCompositionAnalyzer.exe"
          if (-not (Test-Path $exe)) { Write-Error "Binary not built"; exit 1 }
          $size = (Get-Item $exe).Length
          Write-Host "Binary size: $size bytes ($([math]::Round($size/1MB,1)) MB)"
          if ($size -lt 5000000) {
            Write-Error "Binary suspiciously small ($size bytes) — build likely broken"
            exit 1
          }

      - name: Upload EXE as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaterialCompositionAnalyzer-windows
          path: dist/MaterialCompositionAnalyzer.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MaterialCompositionAnalyzer.exe
          generate_release_notes: true
