name: Build and Release Windows EXE

on:
  push:
    tags:
      - "v*"           # Triggers on tags like v1.0, v1.2.3, etc.
  workflow_dispatch:    # Also allows manual runs from the Actions tab

permissions:
  contents: write       # Needed to create a GitHub Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name MaterialCompositionAnalyzer analyze_materials.py

      - name: Smoke-test the binary (CLI --help should exit cleanly)
        shell: pwsh
        run: |
          # --windowed apps don't print to the parent console on Windows, but
          # we can at least verify the EXE launches without error and exits.
          $proc = Start-Process -FilePath "dist\MaterialCompositionAnalyzer.exe" `
                                -ArgumentList "--help" -PassThru -Wait
          if ($proc.ExitCode -ne 0) { exit $proc.ExitCode }

      - name: Upload EXE as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaterialCompositionAnalyzer-windows
          path: dist/MaterialCompositionAnalyzer.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MaterialCompositionAnalyzer.exe
          generate_release_notes: true
